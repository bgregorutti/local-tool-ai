<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Tool AI</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d0d0d;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
#sidebar {
  width: 220px;
  min-width: 220px;
  background: #141414;
  border-right: 1px solid #222;
  display: flex;
  flex-direction: column;
  padding: 20px 14px;
  gap: 14px;
}

#sidebar h1 {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.4px;
}

#model-tag {
  font-size: 11px;
  color: #555;
  background: #1b1b1b;
  border: 1px solid #252525;
  border-radius: 5px;
  padding: 5px 9px;
  word-break: break-all;
  line-height: 1.4;
}

#new-chat-btn {
  background: transparent;
  color: #5a9cf5;
  border: 1px solid #2a4a7a;
  border-radius: 7px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s, border-color 0.15s;
  text-align: left;
}

#new-chat-btn:hover { background: #1a2a3a; border-color: #3a6aaf; }

/* ── Main ────────────────────────────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* ── Messages ────────────────────────────────────────────────────────── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 28px 0 12px;
  scroll-behavior: smooth;
}

#messages::-webkit-scrollbar { width: 5px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

/* ── Empty state ─────────────────────────────────────────────────────── */
#empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 10px;
  color: #3a3a3a;
  user-select: none;
}

#empty-state h2 { font-size: 20px; color: #444; font-weight: 600; }
#empty-state p  { font-size: 13px; }

/* ── Message rows ────────────────────────────────────────────────────── */
.msg-row {
  padding: 3px 28px;
  display: flex;
}

.msg-row.user      { justify-content: flex-end; }
.msg-row.assistant { justify-content: flex-start; }

.bubble {
  max-width: 68%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}

.msg-row.user .bubble {
  background: #1b3558;
  border: 1px solid #274e82;
  color: #cde4ff;
  border-bottom-right-radius: 4px;
}

.msg-row.assistant .bubble {
  background: #1a1a1a;
  border: 1px solid #252525;
  color: #e0e0e0;
  border-bottom-left-radius: 4px;
}

/* blinking cursor during streaming */
.cursor {
  display: inline-block;
  width: 2px;
  height: 0.9em;
  background: #5a9cf5;
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

/* ── Tool cards ──────────────────────────────────────────────────────── */
.tool-row {
  padding: 3px 28px;
  display: flex;
}

.tool-card {
  max-width: 68%;
  border: 1px solid #252525;
  border-radius: 10px;
  overflow: hidden;
  font-size: 13px;
  background: #111;
}

.tool-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 12px;
  background: #181825;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}

.tool-header:hover { background: #1e1e2e; }

.tool-name {
  font-weight: 600;
  color: #a78bfa;
  font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
  font-size: 12px;
}

.tool-status {
  font-size: 11px;
  color: #555;
  margin-left: auto;
}

.tool-chevron {
  color: #444;
  font-size: 10px;
  transition: transform 0.2s;
  flex-shrink: 0;
}

.tool-card.open .tool-chevron { transform: rotate(90deg); }

.tool-body {
  display: none;
  padding: 10px 12px;
  background: #0e0e0e;
  border-top: 1px solid #1e1e1e;
}

.tool-card.open .tool-body { display: block; }

.tool-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #444;
  margin-bottom: 5px;
}

.tool-code {
  font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
  font-size: 12px;
  color: #aaa;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 100px;
  overflow-y: auto;
}

.tool-divider { border: none; border-top: 1px solid #1e1e1e; margin: 9px 0; }

.tool-result {
  font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
  font-size: 12px;
  color: #7ec87e;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 140px;
  overflow-y: auto;
}

/* ── Error banner ────────────────────────────────────────────────────── */
.error-row {
  padding: 3px 28px;
}

.error-bubble {
  display: inline-block;
  font-size: 13px;
  color: #ff7070;
  background: #2a1111;
  border: 1px solid #5a1f1f;
  border-radius: 8px;
  padding: 8px 13px;
  max-width: 68%;
}

/* ── Input area ──────────────────────────────────────────────────────── */
#input-area {
  padding: 14px 28px 18px;
  border-top: 1px solid #1a1a1a;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

#input {
  flex: 1;
  background: #161616;
  border: 1px solid #252525;
  border-radius: 10px;
  color: #e0e0e0;
  font-size: 14px;
  padding: 10px 14px;
  resize: none;
  min-height: 42px;
  max-height: 160px;
  font-family: inherit;
  outline: none;
  line-height: 1.5;
  transition: border-color 0.15s;
  overflow-y: auto;
}

#input:focus { border-color: #2a5a9a; }
#input::placeholder { color: #383838; }

#send-btn {
  background: #1b3558;
  color: #5a9cf5;
  border: 1px solid #274e82;
  border-radius: 10px;
  padding: 0 18px;
  height: 42px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  transition: background 0.15s;
  flex-shrink: 0;
}

#send-btn:hover:not(:disabled) { background: #22406a; }
#send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Local Tool AI</h1>
  <div id="model-tag">loading…</div>
  <button id="new-chat-btn" onclick="newChat()">+ New conversation</button>
</div>

<div id="main">
  <div id="messages">
    <div id="empty-state">
      <h2>Local Tool AI</h2>
      <p>Search files · read code · run commands</p>
    </div>
  </div>

  <div id="input-area">
    <textarea
      id="input"
      placeholder="Ask something… (Enter to send, Shift+Enter for newline)"
      rows="1"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
// ── Session ───────────────────────────────────────────────────────────────────
let sessionId = localStorage.getItem('ltai-session');
if (!sessionId) {
  sessionId = crypto.randomUUID();
  localStorage.setItem('ltai-session', sessionId);
}

// ── Model info ────────────────────────────────────────────────────────────────
fetch('/info')
  .then(r => r.json())
  .then(d => { document.getElementById('model-tag').textContent = d.model; })
  .catch(() => { document.getElementById('model-tag').textContent = 'unknown'; });

// ── Textarea auto-resize + Enter key ─────────────────────────────────────────
const inputEl = document.getElementById('input');

inputEl.addEventListener('input', resizeInput);

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function resizeInput() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
}

// ── New conversation ──────────────────────────────────────────────────────────
async function newChat() {
  await fetch('/reset', {
    method: 'POST',
    headers: { 'X-Session-ID': sessionId },
  }).catch(() => {});

  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
    <div id="empty-state">
      <h2>Local Tool AI</h2>
      <p>Search files · read code · run commands</p>
    </div>`;
}

// ── Send message ──────────────────────────────────────────────────────────────
let busy = false;

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || busy) return;

  setBusy(true);
  removeEmptyState();
  appendUserBubble(text);
  inputEl.value = '';
  resizeInput();

  // The assistant bubble is placed last; tool cards insert before it.
  const { assistantRow, bubble } = createAssistantBubble();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Session-ID': sessionId },
      body: JSON.stringify({ message: text }),
    });

    if (!res.ok) {
      removeNodeIfEmpty(assistantRow);
      appendError('Server error ' + res.status);
      setBusy(false);
      return;
    }

    await consumeSSE(res, assistantRow, bubble);
  } catch (err) {
    removeNodeIfEmpty(assistantRow);
    appendError('Connection error: ' + err.message);
  }

  setBusy(false);
}

// ── SSE consumer ──────────────────────────────────────────────────────────────
async function consumeSSE(response, assistantRow, bubble) {
  const reader = response.body.getReader();
  const dec    = new TextDecoder();
  let buffer   = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += dec.decode(value, { stream: true });
    const parts = buffer.split('\n\n');
    buffer = parts.pop(); // incomplete tail

    for (const part of parts) {
      for (const line of part.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        try {
          handleEvent(JSON.parse(line.slice(6)), assistantRow, bubble);
        } catch (_) {}
      }
    }
  }
}

// ── Event handler ─────────────────────────────────────────────────────────────
let _activeToolCard = null;

function handleEvent(evt, assistantRow, bubble) {
  switch (evt.type) {
    case 'tool_call':
      _activeToolCard = appendToolCard(evt.name, evt.args, assistantRow);
      break;

    case 'tool_result':
      if (_activeToolCard) finaliseToolCard(_activeToolCard, evt.content);
      break;

    case 'text_delta':
      appendDelta(bubble, evt.content);
      break;

    case 'done':
      removeCursor(bubble);
      break;

    case 'error':
      removeCursor(bubble);
      removeNodeIfEmpty(assistantRow);
      appendError(evt.message);
      break;
  }
  scrollBottom();
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
const msgsEl = document.getElementById('messages');

function removeEmptyState() {
  document.getElementById('empty-state')?.remove();
}

function appendUserBubble(text) {
  const row    = el('div', 'msg-row user');
  const bubble = el('div', 'bubble');
  bubble.textContent = text;
  row.appendChild(bubble);
  msgsEl.appendChild(row);
  scrollBottom();
}

function createAssistantBubble() {
  const assistantRow = el('div', 'msg-row assistant');
  const bubble       = el('div', 'bubble');
  const cursor       = el('span', 'cursor');
  bubble.appendChild(cursor);
  assistantRow.appendChild(bubble);
  msgsEl.appendChild(assistantRow);
  scrollBottom();
  return { assistantRow, bubble };
}

function appendDelta(bubble, text) {
  const cursor   = bubble.querySelector('.cursor');
  const textNode = document.createTextNode(text);
  bubble.insertBefore(textNode, cursor);
}

function removeCursor(bubble) {
  bubble.querySelector('.cursor')?.remove();
}

function appendToolCard(name, args, assistantRow) {
  const argsStr = JSON.stringify(args, null, 2);
  const row  = el('div', 'tool-row');
  const card = el('div', 'tool-card');

  card.innerHTML = `
    <div class="tool-header" onclick="this.closest('.tool-card').classList.toggle('open')">
      <span style="font-size:13px">⚙</span>
      <span class="tool-name">${esc(name)}</span>
      <span class="tool-status">running…</span>
      <span class="tool-chevron">▶</span>
    </div>
    <div class="tool-body">
      <div class="tool-label">Arguments</div>
      <div class="tool-code">${esc(argsStr)}</div>
    </div>`;

  row.appendChild(card);
  // Insert before the assistant bubble row so order is: user → tools → assistant
  msgsEl.insertBefore(row, assistantRow);
  scrollBottom();
  return card;
}

function finaliseToolCard(card, content) {
  const status = card.querySelector('.tool-status');
  if (status) status.textContent = 'done';

  const body = card.querySelector('.tool-body');
  if (!body) return;

  const hr  = document.createElement('hr');  hr.className = 'tool-divider';
  const lbl = el('div', 'tool-label');       lbl.textContent = 'Result';
  const res = el('div', 'tool-result');      res.textContent = content;

  body.appendChild(hr);
  body.appendChild(lbl);
  body.appendChild(res);
}

function appendError(msg) {
  const row    = el('div', 'error-row');
  const bubble = el('div', 'error-bubble');
  bubble.textContent = '⚠ ' + msg;
  row.appendChild(bubble);
  msgsEl.appendChild(row);
  scrollBottom();
}

function removeNodeIfEmpty(node) {
  const bubble = node?.querySelector('.bubble');
  if (bubble && !bubble.textContent.trim()) node.remove();
}

function setBusy(state) {
  busy = state;
  document.getElementById('send-btn').disabled = state;
  inputEl.disabled = state;
  if (!state) inputEl.focus();
}

function scrollBottom() {
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

// ── Tiny helpers ──────────────────────────────────────────────────────────────
function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
